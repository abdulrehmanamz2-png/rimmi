<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Business Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-color: #00d2ff; --bg-color: #0f172a; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg-color); 
            color: white; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            padding: 20px 0;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 90%;
            text-align: center;
        }

        input, textarea {
            width: 100%; padding: 12px; margin: 8px 0;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px; color: white; outline: none;
            box-sizing: border-box; font-family: inherit;
        }

        textarea { height: 80px; resize: none; }

        button {
            background: linear-gradient(45deg, var(--main-color), #3a7bd5);
            color: white; border: none; padding: 15px; border-radius: 12px;
            width: 100%; font-weight: bold; cursor: pointer; margin-top: 15px;
        }

        #profile-img {
            width: 110px; height: 110px; border-radius: 50%;
            object-fit: cover; border: 3px solid var(--main-color);
            box-shadow: 0 0 15px var(--main-color);
        }

        .social-links { display: flex; justify-content: center; gap: 15px; margin-top: 20px; flex-wrap: wrap; }
        .social-links a { 
            color: white; font-size: 24px; transition: 0.3s; 
            width: 45px; height: 45px; background: rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center; border-radius: 50%;
            text-decoration: none;
        }
        .social-links a:hover { transform: scale(1.2); color: var(--main-color); }

        .description { color: #cbd5e1; font-size: 14px; line-height: 1.6; margin: 15px 0; text-align: justify; }
    </style>
</head>
<body>

    <div class="container" id="input-form">
        <h2 style="color: var(--main-color); margin-bottom: 5px;">Business Builder 🚀</h2>
        <p style="font-size: 12px; color: #94a3b8;">Fill your details for the world to see</p>
        
        <input type="text" id="name" placeholder="Full Name">
        <input type="text" id="skill" placeholder="Your Title (e.g. Splicer / Editor)">
        <textarea id="about" placeholder="Tell us about yourself (Description)..."></textarea>
        
        <input type="text" id="img" placeholder="Photo Link (URL)">
        <input type="number" id="phone" placeholder="WhatsApp Number (92...)">
        <input type="text" id="fb" placeholder="Facebook Profile Link">
        <input type="text" id="ig" placeholder="Instagram Username">
        <input type="email" id="email" placeholder="Email Address">

        <label style="font-size: 12px; color: #94a3b8;">Brand Color:</label>
        <input type="color" id="color" value="#00d2ff">
        
        <button onclick="saveData()">Launch Portfolio</button>
    </div>

    <div id="portfolio-result" class="container" style="display: none;">
        <img id="out-img" src="" alt="User">
        <h1 id="out-name" style="margin: 10px 0 5px 0;"></h1>
        <p id="out-skill" style="color: var(--main-color); margin: 0; font-weight: bold;"></p>
        
        <div class="description" id="out-about"></div>

        <div class="social-links" id="links-container">
            </div>
        
        <p style="font-size: 12px; margin-top: 30px; color: #64748b; cursor: pointer;" onclick="resetAll()">← Edit Details</p>
    </div>

    <script>
        function saveData() {
            var data = {
                name: document.getElementById("name").value,
                skill: document.getElementById("skill").value,
                about: document.getElementById("about").value,
                img: document.getElementById("img").value,
                phone: document.getElementById("phone").value,
                fb: document.getElementById("fb").value,
                ig: document.getElementById("ig").value,
                email: document.getElementById("email").value,
                color: document.getElementById("color").value
            };
            localStorage.setItem("finalPortfolio", JSON.stringify(data));
            display(data);
        }

        function display(data) {
            document.getElementById("input-form").style.display = "none";
            document.getElementById("portfolio-result").style.display = "block";
            document.documentElement.style.setProperty('--main-color', data.color);
            
            document.getElementById("out-name").innerText = data.name;
            document.getElementById("out-skill").innerText = data.skill;
            document.getElementById("out-about").innerText = data.about;
            document.getElementById("out-img").src = data.img || 'https://ui-avatars.com/api/?name='+data.name;

            var linksHTML = '';
            if(data.phone) linksHTML += `<a href="https://wa.me/${data.phone}" target="_blank"><i class="fab fa-whatsapp"></i></a>`;
            if(data.fb) linksHTML += `<a href="${data.fb}" target="_blank"><i class="fab fa-facebook-f"></i></a>`;
            if(data.ig) linksHTML += `<a href="https://instagram.com/${data.ig}" target="_blank"><i class="fab fa-instagram"></i></a>`;
            if(data.email) linksHTML += `<a href="mailto:${data.email}"><i class="fas fa-envelope"></i></a>`;
            
            document.getElementById("links-container").innerHTML = linksHTML;
        }

        function resetAll() { localStorage.clear(); location.reload(); }

        window.onload = function() {
            var saved = JSON.parse(localStorage.getItem("finalPortfolio"));
            if(saved) display(saved);
        }
    </script>
</body>
</html>
